<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Frigo — Monito</title>
<meta name="description" content="Descrivi cosa sta succedendo al tuo frigo o congelatore. L'Assistente Frigo di Monito ti aiuta a capire i primi passi, subito.">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --midnight:#0e2438;
    --ocean:#1e3a5f;
    --ocean-light:#3d6ea8;
    --ocean-glow:#5b8dc9;
    --alert:#d84c3c;
    --sentinel:#27ae60;
    --frost:#f7f9fb;
    --text:#333333;
    --text-soft:#5a636c;
    --border-soft:rgba(14,36,56,.10);
    --grad-brand:linear-gradient(135deg,var(--ocean-light) 0%,var(--ocean) 55%,var(--midnight) 100%);
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --ease-entrance:cubic-bezier(0.16,1,0.3,1);
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    color:var(--text);
    background:var(--frost);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    display:flex;
    flex-direction:column;
    min-height:100dvh;
  }
  a{color:inherit;}
  button{font-family:inherit;}

  /* ---------- header ---------- */
  .chat-header{
    display:flex;align-items:center;gap:14px;
    padding:14px 18px;
    background:rgba(247,249,251,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border-soft);
    position:sticky;top:0;z-index:10;
  }
  .back-link{
    font-family:var(--font-body);
    font-weight:600;
    font-size:.85rem;
    color:var(--ocean);
    text-decoration:none;
    white-space:nowrap;
    flex-shrink:0;
    opacity:.8;
    transition:opacity 200ms;
  }
  .back-link:hover{opacity:1;}
  .chat-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:.95rem;
    color:var(--ocean);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* ---------- tier banner ---------- */
  .tier-banner{
    font-size:.82rem;
    color:var(--text-soft);
    background:#fff;
    border-bottom:1px solid var(--border-soft);
    padding:10px 18px;
    text-align:center;
  }
  .tier-banner strong{color:var(--ocean);}
  .tier-banner a{color:var(--ocean);text-decoration:underline;}

  /* ---------- auth gating ---------- */
  .auth-loading{
    text-align:center;color:var(--text-soft);font-size:.9rem;
    padding:60px 20px;
  }
  .locked-state{
    max-width:440px;margin:40px auto;padding:0 20px;text-align:center;
  }
  .locked-state h2{
    font-family:var(--font-display);font-size:1.25rem;color:var(--ocean);
    margin:0 0 10px;
  }
  .locked-state p{color:var(--text-soft);font-size:.92rem;line-height:1.6;margin:0 0 22px;}
  .locked-state .btn-upgrade{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--grad-brand);color:#fff;text-decoration:none;
    font-weight:700;font-size:.9rem;padding:13px 24px;border-radius:10px;
  }
  main.chat-shell,#chipRow,#composerForm{display:none;}
  body.tier-standard main.chat-shell,
  body.tier-premium main.chat-shell{display:flex;}
  body.tier-standard #chipRow,
  body.tier-premium #chipRow{display:flex;}
  body.tier-standard #composerForm,
  body.tier-premium #composerForm{display:block;}
  body.tier-standard .auth-loading,
  body.tier-premium .auth-loading,
  body.tier-pilot .auth-loading{display:none;}
  .locked-state{display:none;}
  body.tier-pilot .locked-state{display:block;}

  /* ---------- chat shell ---------- */
  .chat-shell{
    flex:1;
    flex-direction:column;
    max-width:640px;
    width:100%;
    margin:0 auto;
    min-height:0;
  }
  .chat-log{
    flex:1;
    overflow-y:auto;
    padding:18px 16px 8px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* ---------- message bubbles ---------- */
  .msg{
    max-width:82%;
    padding:12px 15px;
    border-radius:16px;
    font-size:.92rem;
    line-height:1.55;
    white-space:pre-wrap;
  }
  .msg p{margin:0;}
  .msg-assistant{
    align-self:flex-start;
    background:#fff;
    border:1px solid var(--border-soft);
    color:var(--text);
    border-bottom-left-radius:4px;
  }
  .msg-user{
    align-self:flex-end;
    background:var(--ocean);
    color:#fff;
    border-bottom-right-radius:4px;
  }
  .msg-image{
    display:block;
    max-width:100%;
    border-radius:10px;
    margin-bottom:8px;
  }
  .msg-enter{
    animation:msgIn 420ms var(--ease-entrance) both;
  }
  @keyframes msgIn{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .msg-enter{animation:none;}
  }

  /* ---------- typing indicator ---------- */
  .msg-typing{
    display:flex;align-items:center;gap:5px;
    padding:14px 16px;
  }
  .msg-typing .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--text-soft);
    opacity:.35;
    animation:typingPulse 1100ms var(--ease-entrance) infinite;
  }
  .msg-typing .dot:nth-child(2){animation-delay:140ms;}
  .msg-typing .dot:nth-child(3){animation-delay:280ms;}
  @keyframes typingPulse{
    0%,70%,100%{opacity:.35;transform:translateY(0) scale(1);}
    35%{opacity:1;transform:translateY(-4px) scale(1.15);}
  }
  @media (prefers-reduced-motion: reduce){
    .msg-typing .dot{animation:none;opacity:.6;}
  }

  /* ---------- chips ---------- */
  .chip-row{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:0 16px 14px;
  }
  .chip{
    background:transparent;
    border:1px solid var(--border-soft);
    color:var(--text-soft);
    font-size:.78rem;
    padding:7px 13px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color 200ms,color 200ms;
  }
  .chip:hover{border-color:var(--ocean-light);color:var(--ocean);}

  /* ---------- composer ---------- */
  .composer{
    position:sticky;bottom:0;
    background:var(--frost);
    border-top:1px solid var(--border-soft);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .image-preview{
    display:flex;align-items:center;gap:8px;
    margin-bottom:10px;
  }
  .image-preview img{
    width:52px;height:52px;object-fit:cover;
    border-radius:8px;
    border:1px solid var(--border-soft);
  }
  .image-preview button{
    width:24px;height:24px;
    border-radius:50%;
    border:1px solid var(--border-soft);
    background:#fff;
    color:var(--text-soft);
    cursor:pointer;
    font-size:.9rem;
    line-height:1;
  }
  .composer-row{
    display:flex;align-items:flex-end;gap:8px;
  }
  .upload-btn{
    flex-shrink:0;
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid var(--border-soft);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--ocean);
    transition:border-color 200ms,background 200ms;
  }
  .upload-btn:hover{border-color:var(--ocean-light);background:rgba(30,58,95,.04);}
  .upload-btn svg{width:19px;height:19px;}
  #textInput{
    flex:1;
    resize:none;
    border:1px solid var(--border-soft);
    border-radius:20px;
    padding:10px 16px;
    font-family:var(--font-body);
    font-size:.92rem;
    color:var(--text);
    background:#fff;
    max-height:120px;
    line-height:1.4;
  }
  #textInput:focus{outline:none;border-color:var(--ocean-light);}
  .send-btn{
    flex-shrink:0;
    width:40px;height:40px;
    border-radius:50%;
    border:none;
    background:var(--grad-brand);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform 180ms var(--ease-entrance),opacity 180ms;
  }
  .send-btn:hover{transform:translateY(-1px);}
  .send-btn:disabled{opacity:.5;cursor:default;transform:none;}
  .send-btn svg{width:17px;height:17px;}

  @media (min-width:641px){
    .chat-shell{padding-bottom:24px;}
    .composer{border-radius:14px;border:1px solid var(--border-soft);margin-top:8px;}
  }
</style>
</head>
<body>

<header class="chat-header">
  <a href="index.html" class="back-link">← Monito</a>
  <span class="chat-title">Assistente Frigo</span>
</header>

<div class="tier-banner" id="tierBanner">
  Incluso nei piani <strong>Standard</strong> e <strong>Premium</strong>.
</div>

<div class="auth-loading" id="authLoading">Verifica accesso...</div>

<div class="locked-state">
  <h2>L'Assistente Frigo non è incluso nel piano Pilot</h2>
  <p>Passa a Standard o Premium per avere aiuto immediato quando qualcosa non va, con foto e tutto.</p>
  <a class="btn-upgrade" href="https://wa.me/393515905913" target="_blank" rel="noopener">Scrivici per passare</a>
</div>

<main class="chat-shell">
  <div class="chat-log" id="chatLog"></div>

  <div class="chip-row" id="chipRow">
    <button type="button" class="chip" data-text="Il frigo fa un rumore strano">Il frigo fa un rumore strano</button>
    <button type="button" class="chip" data-text="È caldo ma sembra acceso">È caldo ma sembra acceso</button>
    <button type="button" class="chip" data-text="Ho ricevuto un allarme e non so cosa fare">Ho ricevuto un allarme e non so cosa fare</button>
    <button type="button" class="chip" data-text="Non si accende per niente">Non si accende per niente</button>
  </div>

  <form class="composer" id="composerForm">
    <div class="image-preview" id="imagePreview" hidden>
      <img id="imagePreviewImg" alt="Foto allegata">
      <button type="button" id="imageRemoveBtn" aria-label="Rimuovi foto">×</button>
    </div>
    <div class="composer-row">
      <label class="upload-btn" for="imageInput" aria-label="Allega una foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </label>
      <input type="file" id="imageInput" accept="image/jpeg,image/png" hidden>
      <textarea id="textInput" rows="1" placeholder="Scrivi qui..." aria-label="Il tuo messaggio"></textarea>
      <button type="submit" class="send-btn" id="sendBtn" aria-label="Invia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="12" x2="20" y2="12"/>
          <polyline points="14 6 20 12 14 18"/>
        </svg>
      </button>
    </div>
  </form>
</main>

<script type="module">
import { getSession, getTier, signOut } from "./assets/auth.js";

(async function(){
  "use strict";

  // ---------- auth + tier gate ----------
  // Client-side gating is UX only — /api/chat.js independently verifies the
  // session token and tier server-side before ever calling the model, so
  // this check can't be bypassed by skipping straight to the API.
  var session = await getSession();
  if (!session) {
    window.location.href = "accedi.html?redirect=assistente-frigo.html";
    return;
  }

  var tier = await getTier(session.user.id);
  var accessToken = session.access_token;
  var tierBanner = document.getElementById("tierBanner");

  if (tier === "pilot") {
    document.body.classList.add("tier-pilot");
    tierBanner.innerHTML = 'Piano attuale: <strong>Pilot</strong> — l\'Assistente Frigo non è incluso.';
    return; // nothing below this point wires up for a pilot-tier visitor
  }

  document.body.classList.add(tier === "premium" ? "tier-premium" : "tier-standard");
  tierBanner.innerHTML = 'Piano attuale: <strong>' + (tier === "premium" ? "Premium" : "Standard") + '</strong> · <a href="#" id="signOutLink">Esci</a>';
  document.getElementById("signOutLink").addEventListener("click", function(e){
    e.preventDefault();
    signOut().then(function(){ window.location.href = "index.html"; });
  });

  // TODO: sostituisci con il numero reale del frigorista (usato solo se la
  // chiamata all'assistente fallisce del tutto — la risposta normale del
  // modello usa il numero configurato lato server, vedi api/chat.js).
  var FRIGORISTA_PLACEHOLDER = "+39 XXX XXXXXXX";

  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var chatLog = document.getElementById("chatLog");
  var chipRow = document.getElementById("chipRow");
  var composerForm = document.getElementById("composerForm");
  var textInput = document.getElementById("textInput");
  var imageInput = document.getElementById("imageInput");
  var imagePreview = document.getElementById("imagePreview");
  var imagePreviewImg = document.getElementById("imagePreviewImg");
  var imageRemoveBtn = document.getElementById("imageRemoveBtn");
  var sendBtn = document.getElementById("sendBtn");

  var messages = []; // Anthropic Messages API shape: [{role, content}]
  var pendingImage = null; // {base64, mediaType, dataUrl}
  var isSending = false;

  function scrollToBottom(){
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function appendBubble(role, text, imageDataUrl){
    var wrap = document.createElement("div");
    wrap.className = "msg msg-" + role + (reduceMotion ? "" : " msg-enter");
    if (imageDataUrl) {
      var img = document.createElement("img");
      img.className = "msg-image";
      img.src = imageDataUrl;
      img.alt = "Foto allegata dall'utente";
      wrap.appendChild(img);
    }
    if (text) {
      var p = document.createElement("p");
      p.textContent = text;
      wrap.appendChild(p);
    }
    chatLog.appendChild(wrap);
    scrollToBottom();
  }

  function appendTyping(){
    var wrap = document.createElement("div");
    wrap.className = "msg msg-assistant msg-typing";
    wrap.id = "typingIndicator";
    wrap.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    chatLog.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping(){
    var el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  function showFallbackError(){
    appendBubble("assistant", "Mi dispiace, in questo momento non riesco a rispondere. Se il problema è urgente, chiama subito il tecnico frigorista: " + FRIGORISTA_PLACEHOLDER + ".");
  }

  function hideChips(){
    if (chipRow) chipRow.style.display = "none";
  }

  function autoGrow(){
    textInput.style.height = "auto";
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + "px";
  }

  // Opening message — a human question, not an upload prompt.
  appendBubble("assistant", "Cosa hai notato? Il frigo è caldo, fa un rumore strano, o hai ricevuto un allarme?");

  if (chipRow) {
    chipRow.querySelectorAll(".chip").forEach(function(chip){
      chip.addEventListener("click", function(){
        textInput.value = chip.getAttribute("data-text");
        hideChips();
        sendMessage();
      });
    });
  }

  imageInput.addEventListener("change", function(){
    var file = imageInput.files && imageInput.files[0];
    if (!file) return;
    if (!/^image\/(jpeg|png)$/.test(file.type)) {
      alert("Carica solo immagini JPEG o PNG.");
      imageInput.value = "";
      return;
    }
    if (file.size > 4 * 1024 * 1024) {
      alert("L'immagine è troppo grande. Usa una foto sotto i 4MB.");
      imageInput.value = "";
      return;
    }
    var reader = new FileReader();
    reader.onload = function(){
      var dataUrl = String(reader.result);
      var base64 = dataUrl.split(",")[1];
      pendingImage = { base64: base64, mediaType: file.type, dataUrl: dataUrl };
      imagePreviewImg.src = dataUrl;
      imagePreview.hidden = false;
    };
    reader.readAsDataURL(file);
  });

  imageRemoveBtn.addEventListener("click", function(){
    pendingImage = null;
    imageInput.value = "";
    imagePreview.hidden = true;
  });

  textInput.addEventListener("input", autoGrow);
  textInput.addEventListener("keydown", function(e){
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  composerForm.addEventListener("submit", function(e){
    e.preventDefault();
    sendMessage();
  });

  function sendMessage(){
    if (isSending) return;
    var text = textInput.value.trim();
    if (!text && !pendingImage) return;

    hideChips();

    var content = [];
    if (pendingImage) {
      content.push({
        type: "image",
        source: { type: "base64", media_type: pendingImage.mediaType, data: pendingImage.base64 }
      });
    }
    if (text) {
      content.push({ type: "text", text: text });
    }

    appendBubble("user", text, pendingImage ? pendingImage.dataUrl : null);
    messages.push({ role: "user", content: content });

    textInput.value = "";
    autoGrow();
    pendingImage = null;
    imageInput.value = "";
    imagePreview.hidden = true;

    isSending = true;
    sendBtn.disabled = true;
    appendTyping();

    fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + accessToken
      },
      body: JSON.stringify({ messages: messages })
    })
      .then(function(res){
        if (!res.ok) throw new Error("bad status " + res.status);
        return res.json();
      })
      .then(function(data){
        removeTyping();
        if (!data || !data.reply) throw new Error("empty reply");
        appendBubble("assistant", data.reply);
        messages.push({ role: "assistant", content: data.reply });
      })
      .catch(function(err){
        console.error("Assistente Frigo error:", err);
        removeTyping();
        showFallbackError();
      })
      .finally(function(){
        isSending = false;
        sendBtn.disabled = false;
        textInput.focus();
      });
  }
})();
</script>

</body>
</html>
